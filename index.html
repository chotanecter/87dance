<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>87 Dance</title>
  <meta name="description" content="87 Dance (팔칠댄스) — Coming Soon">
  <link rel="icon" href="/logo-white.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }

    /* Subtle animated background */
    .bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.08;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.15) 0%, transparent 70%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.08; }
      50% { transform: scale(1.1); opacity: 0.12; }
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
    }

    .logo {
      width: 100px;
      height: auto;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.2s;
    }

    .coming-soon {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.6s;
    }

    .socials {
      display: flex;
      gap: 16px;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1s;
    }

    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      transition: all 0.3s;
      text-decoration: none;
    }

    .socials a:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
      transform: scale(1.1);
    }

    .socials svg {
      width: 18px;
      height: 18px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <img src="/logo-white.png" alt="87 Dance" class="logo">
    <div class="coming-soon">Coming Soon</div>
    <div class="socials">
      <a href="https://www.youtube.com/@87DANCEOFFICIAL" target="_blank" rel="noopener" aria-label="YouTube">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      </a>
      <a href="https://www.instagram.com/87danceofficial/" target="_blank" rel="noopener" aria-label="Instagram">

      </a>
    </div>
  </div>
</body>
</html>
